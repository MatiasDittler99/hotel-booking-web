<!doctype html>
<html lang="en">
  <head>
    <!-- ================================
         Metadata básica del documento
         ================================ -->
    <meta charset="UTF-8" />
    
    <!-- ================================
         Favicon de la aplicación
         - Se recomienda usar SVG para escalabilidad
         - La ruta debe ser relativa al directorio `public`
         ================================ -->
    <link rel="icon" type="image/svg+xml" href="/public/assets/images/roomly-icon.png" />
    
    <!-- ================================
         Configuración de viewport para responsive
         - width=device-width: ancho igual al dispositivo
         - initial-scale=1.0: zoom inicial
         ================================ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- ================================
         Título de la aplicación
         - Se muestra en pestañas del navegador y bookmarks
         ================================ -->
    <title>Roomly Stay</title>
  </head>
  
  <body>
    <!-- ================================
         Contenedor principal de React
         - React montará la aplicación en este div
         - ID 'root' usado por createRoot()
         ================================ -->
    <div id="root"></div>
    
    <!-- ================================
         Script principal del frontend
         - Vite permite importar módulos ES6 con type="module"
         - Apunta a `main.jsx` que renderiza <App /> dentro de #root
         ================================ -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
